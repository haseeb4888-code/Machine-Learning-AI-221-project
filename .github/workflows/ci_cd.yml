name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  code_checks:
    name: Code Checks
    uses: ./.github/workflows/code_checks.yml

  unit_tests:
    name: Unit Tests
    needs: code_checks
    uses: ./.github/workflows/unit_tests.yml

  ml_tests:
    name: ML + Data Validation Tests
    needs: code_checks
    uses: ./.github/workflows/ml_tests.yml

  docker:
    name: Container Build / Push
    needs: [unit_tests, ml_tests]
    uses: ./.github/workflows/docker_image.yml
    secrets: inherit
    with:
      push_image: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      image_repo: ghcr.io/${{ github.repository }}
      image_sha: ${{ github.sha }}
