name: ML + Data Validation Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ml_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-ci.txt
            requirements-docker.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip check

      - name: Run ML/data validation tests
        run: |
          pytest -q tests/test_ml_validation.py tests/test_deepchecks.py
