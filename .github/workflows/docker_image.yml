name: Docker Image

on:
  workflow_call:
    inputs:
      push_image:
        description: "Whether to push the built image to GHCR"
        required: true
        type: boolean
      image_repo:
        description: "Image repository, e.g. ghcr.io/owner/repo"
        required: true
        type: string
      image_sha:
        description: "Image tag for the current commit SHA"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (no push)
        if: ${{ !inputs.push_image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false

      - name: Build and push
        if: ${{ inputs.push_image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ inputs.image_repo }}:latest
            ${{ inputs.image_repo }}:${{ inputs.image_sha }}
